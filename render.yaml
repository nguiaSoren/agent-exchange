# Render Blueprint for the Agent Exchange demo API (server/app.py).
#
# Deploys the FastAPI server that serves POST /api/audit (the verify-only "paste your
# own contract" endpoint), /api/run (SSE marketplace lifecycle), /api/jobs/sample, and
# /health. Free-tier Python web service.
#
# ── Dashboard steps (do these once after pushing this file) ─────────────────────────
#   1. Render dashboard -> New -> Blueprint -> pick this repo. Render reads render.yaml.
#   2. The service is created with all `sync: false` env vars BLANK. Set them under the
#      service's Environment tab (NEVER commit secrets):
#        - AIMLAPI_API_KEY          (required — the AI/ML API key the workers + verifier use)
#        - AIMLAPI_MODEL            (worker model id; e.g. gpt-4.1-mini — verify vs /models, L6)
#        - AIMLAPI_VERIFIER_MODEL   (verifier model id; e.g. gpt-4.1)
#        - OPENAI_API_KEY           (the live-mode model provider key; required for mode=live)
#      For mode=live (real Band room + real x402), ALSO set ALL of these — missing any
#      ONE degrades a "live" request to a sim (see server/app.py::_live_keys_present):
#        - BAND_MARKET_KEY                     (or BAND_AGENT_A_KEY — the market identity)
#        - BAND_SPECIALIST_LIABILITY_KEY       (>=1 specialist; the more, the richer the room)
#        - BAND_SPECIALIST_IP_KEY
#        - BAND_SPECIALIST_TERMINATION_KEY
#        - BAND_SPECIALIST_TAX_KEY             (a SECOND owner's account => the cross-owner beat)
#        - BAND_SPECIALIST_DATA_PRIVACY_KEY
#        - BAND_SPECIALIST_INDEMNITY_KEY
#        - BAND_REPORTER_KEY                   (optional; falls back to the market key)
#        - EVM_PRIVATE_KEY                     (the FUNDED Base-Sepolia buyer wallet — testnet only)
#        - SELLER_PAYTO_ADDRESS                (the payout address for the x402 settle)
#        - X402_FACILITATOR_URL                (optional; defaults to https://x402.org/facilitator)
#      SAFETY: server/live_guard.py caps the public live path (single-flight, 30 runs/day,
#      $3/day). Fund the wallet with only a small testnet amount; it is disposable.
#   3. Click Manual Deploy (or push to the connected branch) to build + go live.
#   4. Smoke-test:  curl https://<svc>.onrender.com/health   -> {"ok": true}
#
# ── Why these deps ──────────────────────────────────────────────────────────────────
# server/app.py imports `agent_exchange.payments.receipts`, which triggers
# `agent_exchange/payments/__init__.py` -> that package's __init__ EAGERLY imports
# `x402_gate`, which imports `x402` AT MODULE TOP. So x402 (and its web3/eth-account
# stack) IS required at import time even for the verify-only endpoint — hence
# `pip install -e ".[x402]"` rather than the bare base install. The `frameworks` extra
# (crewai/langgraph) is NOT installed: those are lazy-imported with a native fallback and
# are never reached on the /api/audit path (verified by a blocked-import check). The HTTP
# skin (fastapi + uvicorn) comes from server/requirements.txt.

services:
  - type: web
    name: agent-exchange-api
    runtime: python
    plan: free
    # Install the package WITH the x402 extra (required at import time, see note above)
    # plus the server's HTTP deps. Editable install so `agent_exchange` resolves from src/.
    buildCommand: "pip install -e \".[x402]\" && pip install -r server/requirements.txt"
    # app.py adds src/ to sys.path and load_dotenv()s, so launching from the repo root works.
    startCommand: "uvicorn server.app:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    autoDeploy: false
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      # Secrets — set in the dashboard, never committed.
      - key: AIMLAPI_API_KEY
        sync: false
      - key: AIMLAPI_MODEL
        sync: false
      - key: AIMLAPI_VERIFIER_MODEL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      # --- LIVE-mode secrets (set ALL for mode=live; missing any one => sim) ---
      - key: BAND_MARKET_KEY
        sync: false
      - key: BAND_AGENT_A_KEY
        sync: false
      - key: BAND_AGENT_B_KEY
        sync: false
      - key: BAND_REPORTER_KEY
        sync: false
      - key: BAND_SPECIALIST_LIABILITY_KEY
        sync: false
      - key: BAND_SPECIALIST_IP_KEY
        sync: false
      - key: BAND_SPECIALIST_TERMINATION_KEY
        sync: false
      - key: BAND_SPECIALIST_TAX_KEY
        sync: false
      - key: BAND_SPECIALIST_DATA_PRIVACY_KEY
        sync: false
      - key: BAND_SPECIALIST_INDEMNITY_KEY
        sync: false
      - key: EVM_PRIVATE_KEY
        sync: false
      - key: SELLER_PAYTO_ADDRESS
        sync: false
      - key: X402_FACILITATOR_URL
        sync: false
