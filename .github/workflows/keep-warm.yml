# Manual warm-up for the free-tier Render backend (agent-exchange-api).
#
# Render free web services sleep after ~15 min idle, so the first "Run it live"
# click cold-starts (~60-90s). The frontend already handles that gracefully —
# it shows the disclosed recorded real run while the dyno wakes — so we do NOT
# keep the dyno warm 24/7. A scheduled ping every ~10 min kept it awake around
# the clock and burned the entire free monthly instance-hour allowance, which
# is what got the service suspended.
#
# Instead: warm it ON DEMAND. ~2 min before a live demo / judging window, run
# this workflow manually (Actions tab -> keep-warm -> "Run workflow"). It pings
# /health until the dyno responds 200, leaving it warm for the ~15 min idle
# window. The rest of the time the dyno sleeps and consumes ~zero free hours.
name: keep-warm
on:
  workflow_dispatch:
jobs:
  warm:
    runs-on: ubuntu-latest
    steps:
      - name: Wake the dyno and confirm it is warm
        run: |
          url="https://agent-exchange-api.onrender.com/health"
          # A cold start takes ~60-90s; a single short curl would time out before
          # the dyno is up. Retry until it answers 200 (or give up after ~3 min).
          for i in $(seq 1 18); do
            code=$(curl -s -o /dev/null -w "%{http_code}" -m 20 "$url" || echo "000")
            echo "attempt $i -> HTTP $code"
            if [ "$code" = "200" ]; then
              echo "dyno is warm"
              exit 0
            fi
            sleep 10
          done
          echo "dyno did not warm within ~3 min" >&2
          exit 1
